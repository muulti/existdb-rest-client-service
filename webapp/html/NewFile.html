<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campo de Texto Variable</title>
    <style>
        .container {
            width: 80%; /* Ancho del contenedor */
            margin: 0 auto; /* Centra el contenedor */
        }
        .input-field {
            width: 100%; /* Ocupa todo el ancho del contenedor */
            padding: 10px; /* Ajusta el relleno según necesidad */
            box-sizing: border-box; /* Incluye el relleno en el ancho total */
            font-size: 1em; /* Tamaño de fuente relativo */
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" class="input-field" placeholder="Campo de texto variable">
    </div>
</body>
</html>
